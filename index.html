<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>大会管理 v1（同期テスト）</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  h2 { margin-top: 30px; }
  button { padding: 6px 12px; margin: 4px 0; }
  input { padding: 6px; width: 200px; }
  .player { margin: 4px 0; }
</style>
</head>
<body>

<h1>大会管理 v1（同期テスト）</h1>

<h2>受付</h2>
<button id="resetAll" style="margin-top: 10px;">初期化</button>
<input id="nameInput" placeholder="名前を入力">
<button id="addBtn">追加</button>
<div id="playerList"></div>

<hr>

<h2>勝敗入力</h2>
<select id="player1"></select>
vs
<select id="player2"></select>

<div style="margin-top: 8px;">
  <label><input type="radio" name="winner" value="p1"> 左のプレイヤーが勝ち</label><br>
  <label><input type="radio" name="winner" value="p2"> 右のプレイヤーが勝ち</label>
</div>

<button id="registerWin">勝者を登録</button>


<hr>

<h2>集計結果</h2>
<ul id="resultList"></ul>

<!-- Firebase SDK（compat版） -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
  // ★ あなたの Firebase 設定
  const firebaseConfig = {
    apiKey: "AIzaSyAw3rO-PcDR_Bjt4LLfaqB6bWyTHsph9k",
    authDomain: "taikai-9feb7.firebaseapp.com",
    projectId: "taikai-9feb7",
    storageBucket: "taikai-9feb7.firebasestorage.app",
    messagingSenderId: "937050290163",
    appId: "1:937050290163:web:7f75e74254c4bbf14e4486"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let players = [];

  // Firestore からリアルタイム取得
 db.collection("players").orderBy("createdAt").onSnapshot((snapshot) => {
   playerList.innerHTML = "";
   player1.innerHTML = "";
   player2.innerHTML = "";
   snapshot.forEach((doc) => {
     const player = doc.data();
     const div = document.createElement("div");
     div.style.display = "flex";
     div.style.alignItems = "center";
     div.style.gap = "8px";
     const nameSpan = document.createElement("span");
     nameSpan.textContent = `${player.name}（${player.win}勝）`;
     // 🔧 編集ボタン
      const editBtn = document.createElement("button");
      editBtn.textContent = "編集";
      editBtn.style.background = "#4da6ff";
      editBtn.style.color = "white";
      editBtn.style.border = "none";
      editBtn.style.padding = "4px 8px";
      editBtn.style.borderRadius = "4px";
      editBtn.style.cursor = "pointer";
      editBtn.onclick = () => {
       const newName = prompt("新しい名前を入力してください", player.name);
       if (newName && newName.trim() !== "") {
         db.collection("players").doc(doc.id).update({
          name: newName.trim()
         });
       }
     };
     // 🔥 削除ボタン
     const deleteBtn = document.createElement("button");
     deleteBtn.textContent = "削除";
     deleteBtn.style.background = "#ff4d4d";
     deleteBtn.style.color = "white";
     deleteBtn.style.border = "none";
     deleteBtn.style.padding = "4px 8px";
     deleteBtn.style.borderRadius = "4px";
     deleteBtn.style.cursor = "pointer";
     deleteBtn.onclick = () => {
        if (confirm(`${player.name} を削除しますか？`)) {
          db.collection("players").doc(doc.id).delete();
        }
     };

     div.appendChild(nameSpan);
     div.appendChild(editBtn);
     div.appendChild(deleteBtn);
     playerList.appendChild(div);
     // --- 🔥 勝敗入力のプルダウンに追加 ---
     const option1 = document.createElement("option");
     option1.value = doc.id;
     option1.textContent = player.name;
     player1.appendChild(option1);
     const option2 = document.createElement("option");
     option2.value = doc.id;
     option2.textContent = player.name;
     player2.appendChild(option2);
    });
  });

  // 受付追加
  document.getElementById("addBtn").onclick = () => {
    const name = document.getElementById("nameInput").value.trim();
    if (!name) return;

    db.collection("players").add({
      name,
      win: 0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById("nameInput").value = "";
  };
  document.getElementById("resetAll").onclick = async () => {
    if (!confirm("本当に全てのプレイヤーを削除しますか？")) return;
    const snapshot = await db.collection("players").get();
    const batch = db.batch();
    snapshot.forEach((doc) => {
      batch.delete(doc.ref);
    });
    await batch.commit();
    alert("全てのプレイヤーを削除しました");
  };
  document.getElementById("registerWin").onclick = async () => {
    const p1 = document.getElementById("player1").value;
    const p2 = document.getElementById("player2").value;
    if (!p1 || !p2 || p1 === p2) {
      alert("別々のプレイヤーを選んでください");
      return;
    }
    const winnerRadio = document.querySelector('input[name="winner"]:checked');
    if (!winnerRadio) {
      alert("勝者を選んでください");
      return;
    }
    const winner = winnerRadio.value === "p1" ? p1 : p2;
    // 勝者の win を +1
    const winnerDoc = await db.collection("players").doc(winner).get();
    const currentWin = winnerDoc.data().win || 0;
    await db.collection("players").doc(winner).update({
      win: currentWin + 1
    });
    alert("勝敗を登録しました");
  };
  // --- ランキング（勝ち数順） ---
  db.collection("players")
  .orderBy("win", "desc")
  .onSnapshot((snapshot) => {
    const resultList = document.getElementById("resultList");
    resultList.innerHTML = "";

    let lastWin = null;   // 前のプレイヤーの勝利数
    let lastRank = 0;     // 前の順位
    let index = 0;        // 何人目か（0,1,2,...）

    snapshot.forEach((doc) => {
      const p = doc.data();
      const win = p.win ?? 0;

      // 順位計算
      if (win === lastWin) {
        // 同率
        rank = lastRank;
      } 
      else {
        // 新しい順位
        rank = index + 1;
        lastRank = rank;
        lastWin = win;
      }

      const li = document.createElement("li");
      li.textContent = `${rank}位${win === lastWin ? "" : ""} ${p.name}（${win}勝）`;
      resultList.appendChild(li);

      index++;
    });
  });

</script>

</body>
</html>
