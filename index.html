<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>大会管理 v1（同期テスト）</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  h2 { margin-top: 30px; }
  button { padding: 6px 12px; margin: 4px 0; }
  input { padding: 6px; width: 200px; }
  .player { margin: 4px 0; }
</style>
</head>
<body>

<h1>大会管理 v1（同期テスト）</h1>

<h2>受付</h2>
<input id="nameInput" placeholder="名前を入力">
<button id="addBtn">追加</button>
<div id="playerList"></div>

<hr>

<h2>勝敗入力</h2>
<select id="p1"></select> vs <select id="p2"></select>
<button id="winBtn">勝者を登録</button>

<hr>

<h2>集計結果</h2>
<ul id="resultList"></ul>

<!-- Firebase SDK（compat版） -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
  // ★ あなたの Firebase 設定
  const firebaseConfig = {
    apiKey: "AIzaSyAw3rO-PcDR_Bjt4LLfaqB6bWyTHsph9k",
    authDomain: "taikai-9feb7.firebaseapp.com",
    projectId: "taikai-9feb7",
    storageBucket: "taikai-9feb7.firebasestorage.app",
    messagingSenderId: "937050290163",
    appId: "1:937050290163:web:7f75e74254c4bbf14e4486"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let players = [];

  // Firestore からリアルタイム取得
 db.collection("players").orderBy("createdAt").onSnapshot((snapshot) => {
   playerList.innerHTML = "";
   snapshot.forEach((doc) => {
     const player = doc.data();
     const div = document.createElement("div");
     div.style.display = "flex";
     div.style.alignItems = "center";
     div.style.gap = "8px";
     const nameSpan = document.createElement("span");
     nameSpan.textContent = `${player.name}（${player.win}勝）`;
     // 🔥 削除ボタン
     const deleteBtn = document.createElement("button");
     deleteBtn.textContent = "削除";
     deleteBtn.style.background = "#ff4d4d";
     deleteBtn.style.color = "white";
     deleteBtn.style.border = "none";
     deleteBtn.style.padding = "4px 8px";
     deleteBtn.style.borderRadius = "4px";
     deleteBtn.style.cursor = "pointer";
     deleteBtn.onclick = () => {
        if (confirm(`${player.name} を削除しますか？`)) {
          db.collection("players").doc(doc.id).delete();
        }
     };

     div.appendChild(nameSpan);
     div.appendChild(deleteBtn);
     playerList.appendChild(div);
    });
  });


  function renderPlayers() {
    const list = document.getElementById("playerList");
    const p1 = document.getElementById("p1");
    const p2 = document.getElementById("p2");

    list.innerHTML = "";
    p1.innerHTML = "";
    p2.innerHTML = "";

    players.forEach(p => {
      const li = document.createElement("li");
      li.className = "player";
      li.textContent = `${p.name}（${p.win ?? 0}勝）`;
      list.appendChild(li);

      const opt1 = document.createElement("option");
      opt1.value = p.id;
      opt1.textContent = p.name;
      p1.appendChild(opt1);

      const opt2 = document.createElement("option");
      opt2.value = p.id;
      opt2.textContent = p.name;
      p2.appendChild(opt2);
    });

    renderResults();
  }

  function renderResults() {
    const resultList = document.getElementById("resultList");
    resultList.innerHTML = "";

    const sorted = [...players].sort((a, b) => (b.win ?? 0) - (a.win ?? 0));

    sorted.forEach(p => {
      const li = document.createElement("li");
      li.textContent = `${p.name}：${p.win ?? 0}勝`;
      resultList.appendChild(li);
    });
  }

  // 受付追加
  document.getElementById("addBtn").onclick = () => {
    const name = document.getElementById("nameInput").value.trim();
    if (!name) return;

    db.collection("players").add({
      name,
      win: 0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById("nameInput").value = "";
  };

  // 勝敗登録（p1 を勝者として +1）
  document.getElementById("winBtn").onclick = () => {
    const p1 = document.getElementById("p1").value;
    const p2 = document.getElementById("p2").value;

    if (!p1 || !p2) {
      alert("プレイヤーが足りません");
      return;
    }
    if (p1 === p2) {
      alert("同じプレイヤー同士は選べません");
      return;
    }

    db.collection("players").doc(p1).update({
      win: firebase.firestore.FieldValue.increment(1)
    });
  };
</script>

</body>
</html>
