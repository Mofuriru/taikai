<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>大会管理（Firestore同期版）</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  h2 { margin-top: 30px; }
  button { padding: 6px 12px; margin: 4px 0; }
  input { padding: 6px; width: 200px; }
  .player {
    margin: 6px 0;
    padding: 8px;
    background: #f5f5f5;
    border-radius: 6px;
  }
  .player button {
    margin-left: 8px;
  }
</style>
</head>
<body>

<h1>大会管理（同期版）</h1>

<!-- 受付 -->
<h2>受付</h2>
<input id="nameInput" placeholder="名前を入力">
<button id="addBtn">追加</button>

<ul id="playerList"></ul>

<hr>

<!-- 勝敗入力 -->
<h2>勝敗入力</h2>
<select id="p1"></select> vs <select id="p2"></select>
<button id="winBtn">勝者を登録</button>

<hr>

<!-- 集計 -->
<h2>集計結果</h2>
<ul id="resultList"></ul>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
  // --- Firebase設定（あなたの設定をそのまま使用） ---
  const firebaseConfig = {
    apiKey: "AIzaSyAw3rO-PcDR_Bjt4LLfaqB6bWyTHsph9k",
    authDomain: "taikai-9feb7.firebaseapp.com",
    projectId: "taikai-9feb7",
    storageBucket: "taikai-9feb7.firebasestorage.app",
    messagingSenderId: "937050290163",
    appId: "1:937050290163:web:7f75e74254c4bbf14e4486"
  };

  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let players = [];

  // --- Firestoreからリアルタイム取得 ---
  db.collection("players").onSnapshot(snapshot => {

    players = snapshot.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }));
    renderPlayers();
  });

  // --- プレイヤー一覧表示 ---
  function renderPlayers() {
    const list = document.getElementById("playerList");
    const p1 = document.getElementById("p1");
    const p2 = document.getElementById("p2");

    list.innerHTML = "";
    p1.innerHTML = "";
    p2.innerHTML = "";

    players.forEach(p => {
      const li = document.createElement("li");
      li.className = "player";

      li.innerHTML = `
        ${p.name}（${p.win}勝）
        <button onclick="editPlayer('${p.id}')">編集</button>
        <button onclick="deletePlayer('${p.id}')">削除</button>
      `;
      list.appendChild(li);

      const opt1 = document.createElement("option");
      opt1.value = p.id;
      opt1.textContent = p.name;
      p1.appendChild(opt1);

      const opt2 = document.createElement("option");
      opt2.value = p.id;
      opt2.textContent = p.name;
      p2.appendChild(opt2);
    });

    renderResults();
  }

  // --- 集計表示 ---
  function renderResults() {
    const resultList = document.getElementById("resultList");
    resultList.innerHTML = "";

    const sorted = [...players].sort((a, b) => b.win - a.win);

    sorted.forEach(p => {
      const li = document.createElement("li");
      li.textContent = `${p.name}：${p.win}勝`;
      resultList.appendChild(li);
    });
  }

  // --- 受付追加 ---
  document.getElementById("addBtn").onclick = () => {
    const name = document.getElementById("nameInput").value.trim();
    if (!name) return;

    db.collection("players").add({
      name,
      win: 0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById("nameInput").value = "";
  };

  // --- 編集 ---
  function editPlayer(id) {
    const player = players.find(p => p.id === id);
    const newName = prompt("新しい名前を入力", player.name);

    if (newName && newName.trim() !== "") {
      db.collection("players").doc(id).update({
        name: newName.trim()
      });
    }
  }

  // --- 削除 ---
  function deletePlayer(id) {
    if (!confirm("本当に削除しますか？")) return;
    db.collection("players").doc(id).delete();
  }

  // --- 勝敗登録 ---
  document.getElementById("winBtn").onclick = () => {
    const p1 = document.getElementById("p1").value;
    const p2 = document.getElementById("p2").value;

    if (p1 === p2) {
      alert("同じプレイヤー同士は選べません");
      return;
    }

    db.collection("players").doc(p1).update({
      win: firebase.firestore.FieldValue.increment(1)
    });
  };
</script>

</body>
</html>
